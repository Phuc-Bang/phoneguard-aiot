services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: phoneguard-backend
    ports:
      - "8005:8000"
    volumes:
      - ./outputs:/app/outputs
    environment:
      - PHONEGUARD_OUTPUT_DIR=/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: phoneguard-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
